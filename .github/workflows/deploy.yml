name: Deploy to GitHub Pages

# Builds the Vite PWA and publishes it to GitHub Pages. Runs on pushes to the
# development branch and on demand. Requires the repo to be public (or a paid
# GitHub plan) and Pages source set to "GitHub Actions".
on:
  push:
    branches:
      - claude/level2-trainer-app-NGRfa
      - main
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages with the GitHub Actions source if not already on.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
